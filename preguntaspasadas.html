<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Test interactivo 03MSEC</title><style>:root{--bg:#f7f7f8;--card:#fff;--text:#222;--muted:#666;--ok:#197a3a;--bad:#b42318;--accent:#e95b1d;--border:#ddd}*{box-sizing:border-box}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}header{background:var(--accent);color:#fff;padding:22px 16px;text-align:center}header h1{margin:0;font-size:1.45rem}main{max-width:960px;margin:24px auto;padding:0 16px 40px}.panel,.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}.panel{padding:16px;margin-bottom:16px;display:grid;gap:12px}.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}select,button{font:inherit;border:1px solid var(--border);border-radius:10px;padding:10px;background:#fff}button{cursor:pointer}button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}button:disabled{opacity:.55;cursor:not-allowed}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.stat{background:#fafafa;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}.stat b{display:block;font-size:1.2rem}.card{padding:20px}.meta{color:var(--muted);font-size:.92rem;margin-bottom:10px}.question{font-size:1.15rem;font-weight:700;line-height:1.35;margin-bottom:14px}.option{display:block;width:100%;text-align:left;margin:8px 0;padding:12px;border:1px solid var(--border);border-radius:10px;background:#fff}.option.correct{border-color:var(--ok);background:#eaf7ee}.option.wrong{border-color:var(--bad);background:#fdecec}.feedback{margin-top:12px;padding:12px;border-radius:10px;display:none}.feedback.ok{display:block;background:#eaf7ee;color:var(--ok)}.feedback.bad{display:block;background:#fdecec;color:var(--bad)}.nav{display:flex;justify-content:space-between;gap:10px;margin-top:16px;flex-wrap:wrap}.hidden{display:none}@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}</style></head><body><header><h1>Test interactivo 03MSEC — Sociedad, familia y educación</h1><p>Banco limpio · 167 preguntas</p></header><main><section class="panel"><div class="controls"><label>Tema: <select id="themeFilter"><option value="all">Todos</option></select></label><label>Modo: <select id="mode"><option value="ordered">Ordenado</option><option value="random">Aleatorio</option><option value="failed">Solo falladas</option></select></label><button class="primary" id="startBtn">Empezar / reiniciar</button><button id="reviewBtn">Repetir falladas</button></div><div class="stats"><div class="stat"><b id="totalStat">0</b><span>Total</span></div><div class="stat"><b id="currentStat">0</b><span>Actual</span></div><div class="stat"><b id="okStat">0</b><span>Aciertos</span></div><div class="stat"><b id="badStat">0</b><span>Fallos</span></div></div></section><section class="card"><div class="meta" id="meta"></div><div class="question" id="question"></div><div id="options"></div><div class="feedback" id="feedback"></div><div class="nav"><button id="prevBtn">Anterior</button><button id="nextBtn" class="primary">Siguiente</button></div></section><section class="panel hidden" id="resultPanel"><h2>Resultado</h2><p id="resultText"></p></section></main><script>const QUESTIONS=[{"id": 1, "tema": "Coexistencial", "question": "Los valores y normas culturales son importantes en la socialización de la familia porque:", "options": ["Son actitudes hacia los hijos que crean amistad y cariño.", "Les ayuda a unirse como miembros del grupo.", "Todos los miembros de la familia necesitan de valores y normas.", "Determinan la conducta de los padres y el modo en que los hijos interpretan esa conducta y organizan la suya propia."], "answer": 3, "page": ""}, {"id": 2, "tema": "Estilos Parentales y de Crianza", "question": "De los estilos parentales de Maccoby y Martin (1983), ¿cuál corresponde al estilo autoritario?", "options": ["La conducta de los padres se caracteriza por la utilización de la afirmación de poder y el establecimiento de normas rígidas.", "Los padres mantienen un estilo responsivo a las demandas de sus hijos y al mismo tiempo esperan que éstos les respondan de la misma manera."], "answer": 0, "page": ""}, {"id": 3, "tema": "Estilos Parentales y de Crianza", "question": "Los padres son razonablemente responsivos, pero evitan regular las conductas de los hijos.", "options": ["Los padres tienden a limitar el tiempo que invierten en las tareas parentales y solo se preocupan de sus propios problemas.", "Indica la definición del estilo autorizativo:", "Los padres que desarrollan estilo autorizativo, hacen ver a sus hijos de manera clara, tanto cuando el comportamiento es aceptable como cuando el comportamiento no es el adecuado."], "answer": 2, "page": ""}, {"id": 4, "tema": "Estilos Parentales y de Crianza", "question": "Los padres que desarrollan estilo autorizativo, utilizan un nivel de comunicación mínimo tanto en los comportamientos aceptables como en los inadecuados.", "options": ["Los padres que desarrollan estilo autorizativo no suelen mantener ninguna implicación con sus hijos.", "¿Por qué se caracteriza el estilo indulgente desarrollado por Musitu y García (2004)?", "Por una baja implicación/aceptación del hijo y un alto nivel de coerción/imposición.", "Por una alta implicación aceptación del hijo y un alto nivel de coerción/imposición.", "Por una alta implicación/aceptación del hijo y un bajo nivel de coerción/imposición."], "answer": 4, "page": ""}, {"id": 5, "tema": "Autorizativo", "question": "La autoridad de los padres es necesaria para la educación de los hijos y:", "options": ["Aunque no se adecue a la necesidad de los hijos, no es unidireccional.", "Se debe adecuar a la necesidad de los hijos y no es unidireccional.", "Aunque se adecua a la necesidad de los hijos, es unidireccional.", "Debe imponerse por sí misma a no ser que deje de llamarse autoridad."], "answer": 1, "page": ""}, {"id": 6, "tema": "Autorizativo", "question": "El apoyo parental según Musitu se definiría como:", "options": ["Ayudar a los hijos a aprender a decidir y convivir.", "Lograr que los hijos aprendan a discernir y escuchar.", "Lograr que los hijos se sientan cómodos en la presencia de los padres.", "Ayudar a los hijos a ser buenos alumnos y saber defenderse ante las adversidades."], "answer": 2, "page": ""}, {"id": 7, "tema": "TEST 1,2 Y 3", "question": "¿Qué condición mínima debe existir para que se dé una correcta educación intercultural?", "options": ["Existencia de relaciones e intercambios entre individuos, grupos e instituciones de varias culturas", "Existencia de relaciones e intercambios entre instituciones mercantiles de varias culturas democráticas.", "Existencia de relaciones e intercambios entre individuos, grupos e instituciones dentro de una misma cultura.", "No existencia de relaciones y ausencia de intercambios entre individuos, grupos e instituciones de varias culturas."], "answer": 0, "page": "24"}, {"id": 8, "tema": "TEST 1,2 Y 3", "question": "¿Qué condición mínima debe existir para que se dé una correcta educación intercultural?", "options": ["Reconocer de manera tacita no expresa el derecho de la diferencia entre culturas.", "Reconocer de manera explícita el derecho de la diferencia entre culturas", "Reconocer de manera explícita el derecho de la superioridad de la cultura occidental.", "Reconocer de manera explícita el derecho de validez de todas las culturas."], "answer": 1, "page": "24"}, {"id": 9, "tema": "TEST 1,2 Y 3", "question": "¿Qué condición mínima debe existir para que se dé una correcta educación intercultural?", "options": ["Reconocer la existencia de la imposición cultural.", "Reconocer la existencia de la demolición cultural.", "Reconocer la existencia de la pluralidad cultural atomizada.", "Reconocer la existencia de una diversidad cultural"], "answer": 3, "page": "24"}, {"id": 10, "tema": "TEST 1,2 Y 3", "question": "La diversidad de las familias en la actualidad es correlativa a:", "options": ["La velocidad del cambio en la sociedad de la información y la comunicación.", "La diversidad de nuestras sociedades en fragmentación y en continuo movimiento laboral y migratorio"], "answer": 1, "page": "9"}, {"id": 11, "tema": "TEST 1,2 Y 3", "question": "La precariedad laboral y la desprotección del Estado.", "options": ["El bajo nivel adquisitivo de los trabajadores por cuenta de otros.", "La familia además de unidad de supervivencia es un espacio…:", "De intercambio emocional", "De felicidad, pero también de continuos conflictos.", "De consumo y endeudamiento."], "answer": 2, "page": "9"}, {"id": 12, "tema": "TEST 1,2 Y 3", "question": "Una buena relación entre docentes y alumnos debe caracterizarse por cuatro aspectos", "options": ["fundamentales:", "Transparencia, preocupación por los demás, individualidad, cuando cada uno sabe que es apreciado por el otro y satisfacción de las necesidades mutuas", "Transparencia, preocupación por los demás, creatividad y autoayuda de las necesidades propias.", "Transparencia discreta, preocupación por sí mismos, individualidad por encima de todo y satisfacción de las necesidades mutuas sin comprometer las propias.", "Transparencia, preocupación por sí mismos, individualidad, cuando cada uno sabe que es apreciado por el otro y satisfacción de las necesidades mutuas sin comprometer las propias."], "answer": 1, "page": "27"}, {"id": 13, "tema": "TEST 1,2 Y 3", "question": "Desde la escuela, puede existir la percepción de que la participación de las familias puede interferir en los métodos de enseñanza del profesorado, por lo que:", "options": ["Prefieren pedir más participación en la escuela a estos.", "Se muestran complacidos para dar un grado de poder a estos.", "Prefieren denegar su participación en la escuela a estos.", "Se muestran reticentes a dar un grado de poder a éstos", "También puede limitar u obstaculizar la colaboración eficaz de familia-escuela"], "answer": 3, "page": "18"}, {"id": 14, "tema": "TEST 1,2 Y 3", "question": "Las diferencias intergeneracionales entre profesores y padres.", "options": ["Las diferencias de formación entre profesores y padres.", "La confianza, esperanza y/o altas expectativas del profesorado hacia la familia (y viceversa).", "La desconfianza, desencanto y/o bajas expectativas del profesorado hacia la familia (y viceversa)", "También puede limitar u obstaculizar la colaboración eficaz de familia-escuela"], "answer": 2, "page": "19"}, {"id": 15, "tema": "TEST 1,2 Y 3", "question": "La sobre cualificación del profesorado.", "options": ["La ausencia de actividades extraescolares.", "La sobreabundancia de actividades extraescolares. ¿Qué es coeducar?", "Coeducar es el método de intervención educativo que retrocede de la educación mixta y cuyas bases se asientan en la antigua segregación entre niñas y niños, puesto que la diferencia de sexos es demasiado relevante.", "Coeducar es el método de intervención educativo que va más allá de la educación mixta y cuyas bases se asientan en el reconocimiento de la igualdad entre niñas y niños, como si el sexo no existiera.", "Coeducar es el método de intervención educativo que va más allá de la educación mixta y cuyas bases se asientan en el reconocimiento de las potencialidades individuales de niñas y niños, independientemente de su sexo"], "answer": 4, "page": "23"}, {"id": 16, "tema": "TEST 1,2 Y 3", "question": "Los diferentes estilos parentales tienen que ver con:", "options": ["El temperamento y el entorno social de los padres.", "Los caracteres psicológicos de los padres.", "Las actitudes que surgen a la hora de ejercer la autoridad"], "answer": 2, "page": "10"}, {"id": 17, "tema": "Los objetivos de la Educación de sus hijos son", "question": "En el informe PISA (la Octava edición 2022) de diciembre de 2023 los datos sobre fracaso escolar en España han sido", "options": ["Los peores de la historia", "Los mejores de la historia.", "Un tanto mejores que la media europea.", "Un tanto peores que la media europea."], "answer": 0, "page": "21"}, {"id": 18, "tema": "Los objetivos de la Educación de sus hijos son", "question": "¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "options": ["Revisar el lenguaje y los materiales que se usan habitualmente, en especial la literatura: adquirir nuevos títulos que perpetúen estereotipos y hacer uso de los clásicos en su acepción original.", "Revisar el lenguaje y los materiales que se usan habitualmente, en especial la literatura: adquirir nuevos títulos que rompan estereotipos y hacer uso de los clásicos de manera correcta", "Revisar el lenguaje de signos que se usan habitualmente, en especial el científico: utilizar nuevos signos que rompan estereotipos y hacer uso de estos de manera correcta.", "Revisar el lenguaje y los materiales que se usan habitualmente, en especial las matemáticas: adquirir nuevos títulos que rompan estereotipos y hacer uso de la trigonometría de manera correcta."], "answer": 1, "page": "24"}, {"id": 19, "tema": "Los objetivos de la Educación de sus hijos son", "question": "¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "options": ["Realizar actividades de imposición en coeducación: intervenir en la manipulación de actividades en contra de la discriminación sexual y de género.", "Realizar actividades de concienciación en coeducación: intervenir en la realización de actividades a favor de la discriminación sexual y de género.", "Realizar actividades de concienciación en coeducación: intervenir en la realización de actividades en contra de la discriminación religiosa y étnica.", "Realizar actividades de concienciación en coeducación: intervenir en la realización de actividades en contra de la discriminación sexual y de género"], "answer": 3, "page": "24"}, {"id": 20, "tema": "Los objetivos de la Educación de sus hijos son", "question": "¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "options": ["Prohibir y burlarse de expresiones sexistas que son lesivas para la educación y la sociedad.", "Castigar a quien utilice expresiones sexistas con sanciones que conozcan sus padres.", "Castigar a quien utilice expresiones sexistas con sanciones que incluyan a sus padres.", "Analizar y reflexionar sobre las expresiones sexistas que son lesivas para la educación y la sociedad"], "answer": 3, "page": "24"}, {"id": 21, "tema": "Los objetivos de la Educación de sus hijos son", "question": "¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas? (Señala la incorrecta)", "options": ["Reconocer la existencia de la diversidad cultural", "No agrupar por sexos.", "Revisar el lenguaje y los materiales que se usan.", "Analizar y reflexionar sobre las expresiones sexistas."], "answer": 0, "page": "24"}, {"id": 22, "tema": "Los objetivos de la Educación de sus hijos son", "question": "¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "options": ["No agrupar por sexos: agrupar potenciando las diferencias personales como valor añadido para el grupo.", "No agrupar por sexos: agrupar potenciando las diferencias religiosas como valor añadido para el grupo.", "No agrupar por sexos: agrupar potenciando las diferencias étnicas como valor añadido para el grupo.", "No agrupar por sexos: agrupar potenciando las diferencias de capacidades intelectuales como valor añadido para el grupo."], "answer": 0, "page": ""}, {"id": 23, "tema": "Implicación y rigidez", "question": "Las familias de tipo I, las similares a la era preindustrial:", "options": ["Fomentan el desarrollo de sus hijos y consideran que deben participar en el papel educativo de la escuela.", "Limitan el desarrollo de sus hijos y consideran que el papel de la escuela es liberar a los niños de sus familias", "Consideran que el papel de la escuela es ensenar a sus hijos a leer y escribir.", "Consideran que el papel de la escuela es preparar a sus hijos para el entorno rural."], "answer": 1, "page": "16"}, {"id": 24, "tema": "Implicación y rigidez", "question": "La familia tipo I según Redding (1991):", "options": ["Vive en un nivel de subsistencia, permanece atrapada en las demandas diarias de sus hijos y no cuenta con sus hijos para trabajar.", "Es el tipo deseable igualitaria de familia que se quieren alcanzar cuando se obtienen los beneficios de su participación.", "Vive en un nivel de subsistencia, permanece atrapada en las demandas diarias del trabajo y cuenta con los hijos para trabajar. Estas familias limitan el desarrollo de sus hijos y consideran que el papel de la escuela es liberar a los niños de sus familias"], "answer": 2, "page": "16"}, {"id": 25, "tema": "Implicación y rigidez", "question": "La crianza de sus hijos empieza a suponer una barrera para sus propósitos adultos. Están absorbidas por los intereses profesionales o personales y pasan poco tiempo con sus hijos.", "options": ["Las familias tipo I “disponible pero alienado” no tienden a presionar a la escuela, pero sus hijos suelen necesitar:", "Disciplina.", "Apoyo", "Teoría.", "Tratamiento psicológico."], "answer": 2, "page": "16"}, {"id": 26, "tema": "Implicación y rigidez", "question": "La familia de tipo III:", "options": ["Invierte poco tiempo y energía en el desarrollo de los hijos, además de esperar que sea la escuela la que asuma una mayor responsabilidad en su desarrollo", "Es capaz de regalar tiempo y dinero a sus hijos, pero está muy poco preparada para entender sus necesidades.", "Invierte mucho tiempo y energía en el desarrollo de los hijos, además de esperar que sea la escuela la que asuma menor responsabilidad en su desarrollo.", "No es capaz de regalar tiempo y dinero a sus hijos, pero está muy preparada para entender sus necesidades."], "answer": 0, "page": "17"}, {"id": 27, "tema": "Implicación y rigidez", "question": "El apoyo parental es:", "options": ["La conducta exhibida o manifestada por el padre o la madre hacia su hijo, que hace que el menor se sienta cómodo en su presencia, confirmándole que es aceptado y aprobado como persona", "La conducta exhibida o manifestada por el padre o la madre hacia su hijo, que hace que el menor se sienta cómodo pero atento en su presencia, confirmándole que es aceptado si se mantiene en alerta...."], "answer": 0, "page": "10"}, {"id": 28, "tema": "Implicación y rigidez", "question": "La conducta exhibida o manifestada por el padre o la madre hacia su hijo, que hace que el menor se sienta en perpetua vigilancia en su presencia, confirmándole que será castigado.", "options": ["La ayuda necesaria que los padres deben recibir a cuenta de deducciones por parte del Ministerio de Hacienda.", "La ley Orgánica de Calidad de la Educación (LOCE, 2002) incluye:", "La participación de los familiares en los órganos de inspección del centro.", "La participación de los familiares en el Consejo Escolar, como órgano de gestión y control"], "answer": 3, "page": "15"}, {"id": 29, "tema": "Implicación y rigidez", "question": "La participación de los familiares en las actividades extraescolares.", "options": ["La participación de los familiares como Asociación de Padres de Alumnos.", "El estilo parental es:", "El conjunto de prácticas que utilizan los padres para que sus hijos alcancen los objetivos de la socialización primaria"], "answer": 2, "page": "10"}, {"id": 30, "tema": "Implicación y rigidez", "question": "El conjunto de prácticas que utilizan los padres para que sus hijos alcancen los objetivos de la socialización secundaria.", "options": ["El conjunto de prácticas que utilizan los padres para que sus hijos se incorporen sanos al mercado de trabajo.", "Es la actitud o la moda con que los padres se distinguen en cada época histórica o lugar.", "La competencia parental en la sociedad democrática es:", "La capacidad de los padres para educar a sus hijos mediante el ejercicio de su rol parental"], "answer": 3, "page": "09"}, {"id": 31, "tema": "Implicación y rigidez", "question": "La capacidad de los padres de educar a los hijos sin dañarlos emocionalmente.", "options": ["La implicación de las familias en el contexto escolar tiene la siguiente consecuencia:", "Promueve el buen funcionamiento del centro.", "Previene el fracaso escolar.", "Mejora la relación entre alumnado y profesorado.", "Todas son correctas"], "answer": 4, "page": "15"}, {"id": 32, "tema": "Implicación y rigidez", "question": "La implicación de las familias en el contexto escolar es un asunto de tal importancia que puede emparentarse directamente con:", "options": ["El buen funcionamiento del centro, con la buena relación entre alumnos y equipos docentes y, sobre todo, con la disciplina general del entorno educativo.", "El buen funcionamiento del centro, con la buena relación entre alumnos y equipos docentes y, sobre todo, con la fluidez burocrática entre familia y escuela.", "El buen funcionamiento del centro, con la buena relación entre alumnos y equipos docentes y. sobre todo, con el fracaso escolar"], "answer": 2, "page": "15"}, {"id": 33, "tema": "Implicación y rigidez", "question": "El buen funcionamiento del centro, con la buena relación entre alumnos y equipos docentes y. sobre todo, la relación entre padres y administración.", "options": ["¿Qué diferencia fundamental existe entre las escuelas de titularidad estatal y las de titularidad local?", "La calidad de los profesores.", "Las tarifas e impuestos.", "El seguro sanitario de los estudiantes.", "El rol de los padres y su participación en la escuela"], "answer": 4, "page": "14"}, {"id": 34, "tema": "Implicación y rigidez", "question": "El menor cuyo progenitor utiliza un estilo autoritario seria:", "options": ["Conflictivo, irritable, descontento y desconfiado", "Impulsivo y agresivo.", "Asertivo y con una autoestima elevada.", "Enérgico y decidido."], "answer": 0, "page": "11"}, {"id": 35, "tema": "Implicación y rigidez", "question": "Señala los cambios que han influido en la definición de familia en función de las pautas", "options": ["demográficas:", "Aumento de la esperanza de vida y descenso de la natalidad", "Se produce una prolongación del “nido sin usar” y del “nido vacío”.", "Aumento de los hogares unipersonales.", "Nuevas formas de entender la pareja y los proyectos vitales."], "answer": 1, "page": "8"}, {"id": 36, "tema": "Implicación y rigidez", "question": "Musitu y García (2004) desarrollan un modelo bidimensional relativo a:", "options": ["La coerción de los padres y su implicación con cuatro estilos parentales", "La coerción de los padres y su implicación con tres estilos parentales."], "answer": 0, "page": "10"}, {"id": 37, "tema": "Implicación y rigidez", "question": "La coerción y autoridad de los padres con cuatro estilos parentales.", "options": ["Los padres son los encargados y poseen la competencia de ejercer:", "La socialización terciaria.", "La socialización primaria de todos los integrantes de la familia incluidos abuelos.", "La socialización secundaria de los hijos.", "La socialización primaria de los hijos"], "answer": 4, "page": "9"}, {"id": 38, "tema": "Implicación y rigidez", "question": "¿De qué tipo de socialización se encarga la familia?", "options": ["De la socialización primaria de los hijos e hijas", "De la socialización secundaria de los hijos e hijas.", "De la socialización terciaria.", "Ninguna opción es correcta."], "answer": 0, "page": "9"}, {"id": 39, "tema": "Implicación y rigidez", "question": "El control parental:", "options": ["Se relaciona con el grado de esfuerzo que hace el padre o la madre por determinar la conducta de su hijo, esto es, con el grado de control que se pueda alcanzar.", "Se relaciona con el grado de laxitud permisividad que tiene el padre o la madre en el trato en su hijo y no tanto con el grado de control que se pueda alcanzar.", "Es la autoridad que los padres tienen sobre los profesores de la etapa obligatoria de escolarización.", "Se relaciona con el grado de esfuerzo que hace el padre o la madre por influir en su hijo y no tanto con el grado de control que se pueda alcanzar"], "answer": 3, "page": "10"}, {"id": 40, "tema": "Implicación y rigidez", "question": "Entre las dificultades al afrontar la Educación intercultural se encuentra:", "options": ["Conocimiento del nivel curricular que poseen los grupos minoritarios que puede dejar atrás al grupo aula.", "Conocimiento del nivel curricular que poseen los grupos migratorios que puede retrasar el aprendizaje'.", "Conocimiento del nivel curricular que posee el grupo mayoritario que puede retrasar el aprendizaje.", "Conocimiento del nivel curricular que poseen los grupos minoritarios que puede retrasar el aprendizaje"], "answer": 3, "page": "25"}, {"id": 41, "tema": "Implicación y rigidez", "question": "Las dificultades al afrontar la Educación intercultural se encuentran:", "options": ["Una intervención fluida por parte de las familias en los centros.", "Poca intervención por parte de las familias en los centros", "Poca intervención por parte de los servicios sociales en los centros."], "answer": 1, "page": "25"}, {"id": 42, "tema": "Implicación y rigidez", "question": "Una intervención institucional por parte de las familias en los centros.", "options": ["Entre las dificultades al afrontar la Educación intercultural se encuentra", "La comprensión o conocimiento del idioma utilizado en el aula dificulta la comunicación entre los docentes y sus alumnos.", "La comprensión o conocimiento del idioma del grupo minoritario en el aula dificulta la comunicación entre los docentes y sus alumnos.", "La incomprensión o desconocimiento del idioma utilizado en el aula dificulta la comunicación entre los docentes y sus alumnos"], "answer": 3, "page": "25"}, {"id": 43, "tema": "Implicación y rigidez", "question": "La incomprensión o desconocimiento del idioma utilizado en el aula facilita la comunicación entre los docentes y sus alumnos.", "options": ["Entre las dificultades al afrontar la Educación intercultural se encuentra:", "El nivel económico bajo y su vinculación con el alumnado inmigrante"], "answer": 1, "page": "25"}, {"id": 44, "tema": "Implicación y rigidez", "question": "el nivel económico bajo y su vinculación con el alumnado nativo.", "options": ["El nivel económico medio y su vinculación con el alumnado inmigrante.", "El nivel económico alto y su vinculación con el alumnado inmigrante.", "El fracaso escolar:", "Es el hecho de no conseguir terminar cualquier ciclo académico de un sistema educativo.", "Es el hecho de no conseguir terminar el ciclo académico obligatorio de un sistema educativo"], "answer": 4, "page": "21"}, {"id": 45, "tema": "Implicación y rigidez", "question": "En la Ley Orgánica de Ordenación General del Sistema Educativo (LOGSE, 1990) se menciona por primera vez:", "options": ["La relevancia de la participación de los familiares y el claustro para la elección de la dirección.", "La relevancia de la participación de los padres en la creación del PAC.", "La relevancia de las actividades extraescolares para completar el currículo de los estudiantes.", "La relevancia de la participación de los familiares para mejorar la calidad del sistema educativo"], "answer": 3, "page": "15"}, {"id": 46, "tema": "Implicación y rigidez", "question": "Entre las características individuales del alumno que pueden derivar en fracaso escolar", "options": ["encontramos estas 3:", "La implicación del niño en su propio proceso de aprendizaje, sus intereses y su afán de protagonismo.", "La implicación del niño en su propio proceso de aprendizaje, sus intereses y su orgullo.", "La implicación del niño en su propio proceso de aprendizaje, sus intereses y su autosuficiencia"], "answer": 3, "page": "21"}, {"id": 47, "tema": "Implicación y rigidez", "question": "La implicación del niño en su propio proceso de aprendizaje, sus intereses y su prepotencia.", "options": ["¿Para qué tipo de socialización es necesaria la Educación de los padres?", "La Educación de los padres es válida en sí misma.", "Para la Educación terciaria.", "Para la educación secundaria", "Para la Educación primaria."], "answer": 3, "page": "9"}, {"id": 48, "tema": "Implicación y rigidez", "question": "El estilo parental podría definirse como:", "options": ["Una constelación entre actitudes autoritarias hacia su hijo que, consideradas conjuntamente, crean un clima emocional inapropiado en el que se expresan las conductas de sus progenitores o adultos a su cargo.", "Una constelación de actitudes hacia su hijo que, consideradas conjuntamente, crean un clima emocional en el que se expresan las conductas de sus progenitores o adultos a su cargo"], "answer": 1, "page": "10"}, {"id": 49, "tema": "Implicación y rigidez", "question": "El arte de ser padres con cierta categoría que permite diferenciarse en las reuniones escolares o deportivas.", "options": ["Una constelación de actitudes negligentes hacia su hijo que, consideradas conjuntamente, crean un clima emocional adverso en el que se expresan las conductas de sus progenitores o adultos a su cargo.", "Las relaciones intergeneracionales referidas al profesor o profesora:", "Desempeña un doble rol en la relación con su alumnado: por un lado, determina lo que deben de aprender sus estudiantes, el contenido del currículo, y organiza las clases, es decir, desempeña el rol de instructor; esto es, debe mantener la disciplina en el aula", "Con su doble rol sobre el cómo y el que se da en clase, se relaciona con los alumnos como héroe y villano pudiendo hacer tanto bien como mal.", "Con su doble rol respecto a los alumnos sobre lo que deben aprender y como lo deben aprender pueden sustituir a los padres como ejemplo a seguir."], "answer": 2, "page": "27"}, {"id": 50, "tema": "Implicación y rigidez", "question": "Entre las características individuales del alumno que pueden derivar en fracaso escolar podemos distinguir 3:", "options": ["El nivel de hiperactividad del alumno, su esfuerzo y la percepción que tiene del apoyo y la ayuda de sus padres.", "El nivel motivacional del alumno, su falta de rendimiento en las clases de refuerzo y la percepción que tiene del apoyo y la ayuda de sus padres.", "El nivel motivacional del alumno, su esfuerzo y la percepción que tiene del apoyo y las becas de ayuda al estudio.", "El nivel motivacional del alumno, su esfuerzo y la percepción que tiene del apoyo y la ayuda de sus padres"], "answer": 3, "page": "21"}, {"id": 51, "tema": "La prohibición del incesto (pág. 6-7)", "question": "¿Qué acción podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "options": ["Organizar espacios y actividades de manera diversa: ofrecer una amplia gama de actividades y materiales para todos los alumnos, condicionando los espacios y colores en razón de sexos.", "Organizar espacios y actividades de manera diferenciada: ofrecer una amplia gama de actividades y materiales para que los alumnos puedan expresar las diferencias con espacios y colores.", "Organizar espacios y actividades de manera igualitaria: ofrecer una actividad única y monotemática para todos los alumnos, sin utilizar espacios y colores diversos sino exclusivos.", "Organizar espacios y actividades de manera igualitaria: ofrecer una amplia gama de actividades y materiales para todos los alumnos, sin condicionar los espacios y colores"], "answer": 3, "page": "20"}, {"id": 52, "tema": "La prohibición del incesto (pág. 6-7)", "question": "¿Qué tipos de escuela pública hay básicamente en Europa respecto a titularidad?", "options": ["La estatal que depende del Estado y la local que depende de las autonomías.", "La estatal cuya titularidad depende de la Comisión Europea y la local cuya titularidad depende del Estado Nacional.", "La estatal cuya titularidad depende de los Órganos electorales nacionales y la local cuya titularidad depende de las diputaciones.", "La continental o cuya titularidad es estatal y la anglosajona cuya titularidad es local"], "answer": 3, "page": "14"}, {"id": 53, "tema": "La revolución francesa", "question": "¿Cuál de estos factores define mejor la transformación de la familia en las últimas décadas?", "options": ["La democratización de la autoridad de los cónyuges", "Compartir una hipoteca.", "Ser políticamente activa.", "Afrontar los desafíos propios de una sociedad tardo-moderna."], "answer": 0, "page": "8"}, {"id": 54, "tema": "La revolución francesa", "question": "Entre algunas de las características individuales del alumno que pueden derivar en fracaso escolar encontramos:", "options": ["La gestión de los centros educativos, la práctica docente, la administración educativa y los métodos de enseñanza de los profesores.", "Su esfuerzo, su implicación en su propio proceso de aprendizaje, la cultura, su autosuficiencia, sus actividades y creencias con relación a la enseñanza, problemas de aprendizaje y la relación del alumno con su entorno.", "Su esfuerzo, su implicación en su propio proceso de aprendizaje, sus intereses, su autosuficiencia, sus actitudes y creencias con relación a la enseñanza y problemas de aprendizaje"], "answer": 2, "page": "21"}, {"id": 55, "tema": "La revolución francesa", "question": "El nivel socioeconómico de la familia, la cultura, la relación del alumno con su entorno, clase social y origen de alumno, la profesión de los padres, el nivel motivacional del alumno, su esfuerzo, sus intereses y problemas de aprendizaje.", "options": ["En el efecto Pigmalión el clima:", "Se compone de todos los mensajes verbales que emite el docente.", "Se compone de todos los mensajes no verbales que emite el docente", "Se refiere a las expectativas que tiene el profesor en relación al rendimiento de sus alumnos.", "Alude a la cantidad de información que el profesor proporciona a su estudiante o grupo-clase."], "answer": 2, "page": "32"}, {"id": 56, "tema": "La revolución francesa", "question": "El proceso de influencia mediante el cual las expectativas del profesorado influyen en el comportamiento del alumnado se conoce como:", "options": ["Efecto Pigmalión", "Efecto camaleón.", "Proceso motivador.", "Proceso de alusión."], "answer": 0, "page": "28"}, {"id": 57, "tema": "Factor Input del Pigmalión Positivo (pág. 32)", "question": "En la LOMLOE (2020-2023) se menciona la obligación de las familias de participar de forma cooperativa en:", "options": ["actividades concurso que fomenten el respeto entre las diferentes comunidades educativas.", "proyectos de formación y las tareas que se les propongan desde el centro educativo", "actividades recreativas en los tiempos de ocio y vacacionales dentro del recinto escolar.", "actividades dirigidas a la orientación laboral y la autogestión psicológica de permanencia en el paro."], "answer": 1, "page": "15"}, {"id": 58, "tema": "Todas las opciones son correctas (pág. 27)", "question": "La claridad expositiva del profesorado y el ofertar optativamente son comportamientos:", "options": ["Desmotivadores.", "Motivadores", "Participativos.", "Arriesgados."], "answer": 1, "page": "27- 28"}, {"id": 59, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "Las aficiones musicales del alumnado.", "options": ["Los problemas de aprendizaje, el esfuerzo y la motivación.", "El aspecto físico y tono de voz del profesorado."], "answer": 0, "page": ""}, {"id": 60, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "La religión que siga el centro.", "options": ["¿Qué dos factores o dimensiones se consideran a la hora de clasificar los estilos educativos parentales?", "El optimismo y el pesimismo.", "La autoridad y la legalidad.", "La permisividad y la rigidez.", "La implicación/afecto y la coerción/normas."], "answer": 4, "page": ""}, {"id": 61, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "El estilo parental caracter imonio homosexual.", "La normalización de las familias monoparentales.", "La revolución sexual y la emancipación de la mujer"], "answer": 3, "page": "7"}, {"id": 66, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "El estilo autorizativo suele buscar un equilibrio entre:", "options": ["El estilo autoritario y el indulgente", "El estilo negligente e indulgente."], "answer": 0, "page": "11"}, {"id": 67, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "¿Cuál de las siguientes opciones no corresponde a una de las dificultades para trabajar la interculturalidad?", "options": ["Conocimiento del nivel curricular por parte del alumnado.", "Poca intervención de la familia migrante.", "Incomprensión del idioma vehicular.", "Xenofobia implícita"], "answer": 3, "page": "25"}, {"id": 68, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "La coeducación defiende:", "options": ["La Educación entre familia-escuela.", "La enseñanza libre de estereotipos y prejuicios de género.", "La equidad de la enseñanza.", "Los valores éticos."], "answer": 1, "page": ""}, {"id": 69, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "¿Qué principio defiende la participación igualitaria entre las diferentes culturas?", "options": ["La multiculturalidad.", "La coeducación.", "La interculturalidad.", "La globalización."], "answer": 2, "page": ""}, {"id": 70, "tema": "Entre las posibles causas del fracaso escolar se encuentran", "question": "Resulta imprescindible que las familias consideren al centro escolar como una fuente de ayuda que complemente la formación de sus hijos y no.", "options": ["Como un centro educativo cerrado en navidades.", "Como algo que comparte sus mismos fines.", "Como un centro recreativo cerrado en verano.", "Como algo que sustituye y entorpece sus funciones"], "answer": 3, "page": "20"}, {"id": 71, "tema": "Cambios que influyen en el nuevo concepto de familia", "question": "Ser profesor implica:", "options": ["Una oportunidad de crecer.", "Una obligación.", "Tener las cualidades necesarias.", "Recordar aspectos relevantes de la profesión."], "answer": 0, "page": ""}, {"id": 72, "tema": "Cambios que influyen en el nuevo concepto de familia", "question": "Los estilos parentales autoritarios se correlacionan con hijos de rasgos:", "options": ["Conflictivo pero confiable, descontentos pero agradecidos.", "Conflictivos, amables, descontentos y confiados.", "Irritables, contentadizos, desconfiados y resueltos.", "Conflictivos, irritables, descontentos y desconfiados."], "answer": 3, "page": ""}, {"id": 73, "tema": "La profesión de los padres (pág. 21)", "question": "El nivel de motivación del alumnado.", "options": ["Sus intereses.", "Problemas de aprendizaje.", "¿Cuál es el tipo de familia predominante en España?", "Tradicional.", "Monoparental."], "answer": 3, "page": ""}, {"id": 74, "tema": "La profesión de los padres (pág. 21)", "question": "¿A partir de qué momento empieza a descender a su mínima expresión la familia?", "options": ["La revolución francesa.", "El neolítico.", "La industrial.", "El advenimiento del feminismo."], "answer": 2, "page": ""}, {"id": 75, "tema": "LOMCE, 2013", "question": "En referencia a la crianza de los hijos, la descripción “una constelación de actitudes hacia su hijo, basadas en puesta de límites y respuestas afectivas o no, que crean un clima emocional en el que se expresan las conductas de sus progenitores o adultos a su cargo”, ¿a qué hace referencia?", "options": ["Constelación familiar.", "Estilo parental", "Clima familiar.", "Control de conducta."], "answer": 1, "page": "10"}, {"id": 76, "tema": "LOMCE, 2013", "question": "Según el grupo LISIS, sobre el fomento del Pigmalión positivo, ¿a qué factor se refiere cuando el docente ofrece más detalladamente una valoración de los resultados?:", "options": ["Clima.", "Feedback.", "Input.", "Output."], "answer": 1, "page": ""}, {"id": 77, "tema": "LOMCE, 2013", "question": "¿Cuál de las siguientes opciones no es una barrera de la participación familiar en la escuela?", "options": ["La falta de educación parental.", "Falta de formación del profesorado en el desarrollo de la función orientadora.", "Falta de tiempo y de disponibilidad.", "Falta de sintonía con el proyecto institucional."], "answer": 0, "page": ""}, {"id": 78, "tema": "LOMCE, 2013", "question": "¿Cuál de las siguientes opciones puede representar una barrera de la participación familiar en la escuela?", "options": ["Las diferencias intergeneracionales entre profesores y padres y madres.", "La confianza, esperanza y/o altas expectativas del profesorado hacia la familia (y viceversa).", "La desconfianza, desencanto y/o bajas expectativas del profesorado hacia la familia (y viceversa)."], "answer": 2, "page": ""}, {"id": 79, "tema": "LOMCE, 2013", "question": "Las diferencias de formación entre profesores y padres y madres.", "options": ["¿Qué acciones podemos llevar a cabo para trabajar la coeducación en nuestras escuelas?", "Intervenir en la realización de actividades en contra de la discriminación religiosa y étnica.", "Intervenir en la realización de actividades a favor de la discriminación sexual y de género.", "Intervenir en la realización de actividades en contra de la discriminación sexual y de género.", "Intervenir en la manipulación de actividades en contra de la discriminación sexual y de género."], "answer": 3, "page": ""}, {"id": 80, "tema": "LOMCE, 2013", "question": "La capacidad de los padres para educar a sus hijos mediante el ejercicio de su rol parental se llama:", "options": ["Competencia parental.", "Autoridad parental.", "Crianza parental.", "Educación parental."], "answer": 0, "page": ""}, {"id": 81, "tema": "LOMCE, 2013", "question": "La socialización primaria corresponde a:", "options": ["La familia extensa.", "La familia.", "Los iguales.", "El estado."], "answer": 1, "page": ""}, {"id": 82, "tema": "LOMCE, 2013", "question": "Dar prioridad en la evaluación a los contenidos procedimentales frente a los conceptuales, por desconexión entre los valores laborales y los académicos entre el alumnado de nuevo ingreso o de origen migrante, se entiende como:", "options": ["Una medida de carácter específico para trabajar la interculturalidad", "Una medida de carácter general para desarrollar una evaluación equitativa."], "answer": 0, "page": "26"}, {"id": 83, "tema": "LOMCE, 2013", "question": "Una intervención fluida por parte de los docentes en los centros.", "options": ["Una estrategia de fomento de la igualdad de oportunidades a través de la coeducación.", "La combinación de competencias mixtas en una actividad grupal física, ¿qué método se estaría trabajando?", "Colaboración heterogénea.", "Coeducación.", "Interculturalidad."], "answer": 3, "page": ""}, {"id": 84, "tema": "LOMCE, 2013", "question": "¿A que nos referimos con estilo parental?", "options": ["Al conjunto de prácticas que utilizan los padres para que sus hijos alcancen los objetivos de la socialización secundaria.", "Al conjunto de prácticas que utilizan los padres para que sus hijos alcancen los objetivos de la socialización primaria.", "la actitud o la moda con que los padres se distinguen en cada época histórica o lugar.", "Al conjunto de prácticas que utilizan los padres para que sus hijos se incorporen sanos al mercado de trabajo."], "answer": 1, "page": ""}, {"id": 85, "tema": "LOMCE, 2013", "question": "El descubrimiento de Internet y la revolución sexual.", "options": ["La nueva legislación sobre el matrimonio homosexual y la abolición del Concilio de Trento.", "Cuando dentro de una misma familia se identifican diferentes miembros de diferentes generaciones, ¿a qué tipo de familia nos referimos?", "Tradicional.", "Extensa.", "Nuclear."], "answer": 3, "page": ""}, {"id": 86, "tema": "Contemporánea", "question": "El estilo autorizativo suele buscar un equilibrio entre:", "options": ["El estilo negligente e indulgente.", "La puesta de límites y la expansividad afectiva de manera consecuente y directa.", "Todos los grados del estilo autoritario."], "answer": 1, "page": ""}, {"id": 87, "tema": "Contemporánea", "question": "La coerción de cualquier tipo de conducta y la ausencia de afecto. ¿Qué es el apoyo parental?", "options": ["La ayuda necesaria que los padres deben recibir a cuenta de deducciones por parte del Ministerio de Hacienda.", "La respuesta afectiva de los progenitores hacia sus hijos, que hace que se sientan escuchados y protegidos."], "answer": 1, "page": ""}, {"id": 88, "tema": "Contemporánea", "question": "La respuesta afectiva de los progenitores hacia sus hijos, que hace que se sientan en perpetua vigilancia en su presencia, confirmándoles que serán castigados.", "options": ["La respuesta afectiva de los progenitores hacia sus hijos, que hace que se sientan cómodos pero atentos en su presencia, confirmándoles que son aceptados si se mantienen en alerta.", "El apoyo parental:", "Es la conducta exhibida o manifestada por el padre o la madre hacia su hijo, que hace que el menor se sienta cómodo en su presencia, confirmándole que es aceptado y aprobado como persona.", "Es, junto con el castigo parental, una de las dos dimensiones de los estilos parentales.", "Se relaciona con el grado de esfuerzo que hace el padre o la madre por influir en su hijo y con el grado de control que se pueda alcanzar para conseguir un eficaz desarrollo."], "answer": 2, "page": ""}, {"id": 89, "tema": "Contemporánea", "question": "En cuanto al riesgo de sufrir fracaso escolar, existen ciertas características individuales que aumentan la probabilidad, entre ellas:", "options": ["El nivel motivacional del alumno, su esfuerzo y la percepción que tiene del apoyo y de las becas de ayuda al estudio.", "El nivel motivacional del alumno, su falta de rendimiento en las clases de refuerzo y la percepción que tiene del apoyo y la ayuda de sus padres.", "El nivel motivacional del alumno, su esfuerzo y la percepción que tiene del apoyo y la ayuda de sus padres"], "answer": 2, "page": "21"}, {"id": 90, "tema": "Contemporánea", "question": "El nivel de hiperactividad del alumno, su esfuerzo y la percepción que tiene del apoyo y la ayuda de sus padres.", "options": ["Dentro de las causas que originan en los años 70 un cambio en los modelos de familia en Europa, ¿en qué tipo de cambios se incluyen los referidos a la cohabitación sin matrimonio?", "Pautas familiares.", "Sociales.", "Demográficos."], "answer": 3, "page": ""}, {"id": 91, "tema": "Eclesiásticos", "question": "¿Qué dos factores generan las tipologías de estilos parentales?", "options": ["Afecto y autoridad", "Permisividad y rigidez.", "Control y afecto.", "Permisividad y coerción."], "answer": 0, "page": "10"}, {"id": 92, "tema": "Eclesiásticos", "question": "Según el grupo LISIS, sobre el fomento del Pigmalión positivo, ¿a que factor se refiere cuando el docente mantiene actitudes de apertura, mostrándose espontaneo y comprensivo?", "options": ["Output.", "Input.", "Clima", "Feedback."], "answer": 2, "page": "32"}, {"id": 93, "tema": "TEMA 4, 5 y 6", "question": "¿Desde qué reglamento las familias tienen derecho a escoger el tipo de Educación preferente de sus hijos?", "options": ["Ley Moyano 1857.", "LOMCE 2013.", "Declaración Universal de los Derechos Humanos 1948", "Constitución II República 1931."], "answer": 2, "page": "34"}, {"id": 94, "tema": "TEMA 4, 5 y 6", "question": "¿En qué momento la elección de formación religiosa y moral de los menores respeta las propias convicciones?", "options": ["II República 1931.", "LOE 2006.", "Carta Magna 1978", "Ley Moyano 1857."], "answer": 2, "page": "34"}, {"id": 95, "tema": "TEMA 4, 5 y 6", "question": "Cuando las familias son consideradas como un recurso útil en las escuelas, hablamos de un tipo de escuela:", "options": ["Comunitaria.", "De la liberación.", "Participativa", "Nueva."], "answer": 2, "page": "38"}, {"id": 96, "tema": "TEMA 4, 5 ciones según las necesidades individuales de los estudiantes"], "answer": 4, "page": "45"}, {"id": 101, "tema": "TEMA 4, 5 y 6", "question": "La Educación online ofrece:", "options": ["Flexibilidad en términos de horarios, permitiendo además que los estudiantes adapten sus estudios a sus compromisos familiares y otros", "La necesidad de tener apenas conocimientos de las nuevas tecnologías de la información."], "answer": 0, "page": "43"}, {"id": 102, "tema": "Gracias a la personalización de la Educación", "question": "Los estudiantes pueden avanzar difícilmente a su propio ritmo, permitiéndoles dedicar menos tiempo a conceptos difíciles y avanzar a través de material que ya dominan.", "options": ["La labor del docente se hace más compleja puesto que debe concretar la evaluación para cada estudiante.", "La labor del docente se hace más compleja puesto que debe concretar los contenidos y actividades para cada estudiante.", "Los estudiantes pueden avanzar a su propio ritmo, permitiéndoles dedicar más tiempo a conceptos difíciles y avanzar rápidamente a través de material que ya dominan"], "answer": 2, "page": "45"}, {"id": 103, "tema": "Gracias a la personalización de la Educación", "question": "La escuela jerárquica:", "options": ["Ofrece posibilidades máximas de participación, es consultiva y ejecutiva y para tomar decisiones centrales.", "Ofrece posibilidades mínimas de participación, es meramente consultiva y para tomar decisiones menores"], "answer": 1, "page": "38"}, {"id": 104, "tema": "Gracias a la personalización de la Educación", "question": "La administración consulta a los padres las decisiones importantes.", "options": ["Los padres y los profesores participan con igual porcentaje en las decisiones del consejo escolar. ¿Qué es el aprendizaje hibrido?", "Es la Educación online en la que las actividades cooperativas son presenciales.", "Es la Educación online en la que ocasionalmente hay alguna actividad presencial.", "Es la educación en la que se ponen en com ormas editoriales ilegales y el compromiso estudiantil.", "Garantizar la calidad de la Educación, la equidad de acceso y las plataformas editoriales ilegales."], "answer": 2, "page": "44"}, {"id": 116, "tema": "Las habilidades afectivo-valorativas", "question": "En la escuela comunitaria:", "options": ["Hay participación de los padres y de las instituciones, pero se considera en menor medida la participación del alumno", "Hay participación de los padres y de los alumnos, pero se considera en menor medida la participación de las instituciones.", "Hay participación de los padres y de las instituciones, pero se considera en menor medida la participación del docente.", "Hay participación de los padres y de los docentes, pero se considera en menor medida la participación del alumno."], "answer": 0, "page": "38"}, {"id": 117, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "La colaboración entre familia y escuela tiene efectos particularmente positivos:", "options": ["En las familias con hijos que presentan problemas en la fiscalía de menores.", "En las familias con hijos que presentan cuadros de despersonalización.", "En las familias con hijos que presentan problemas escolares"], "answer": 2, "page": "36"}, {"id": 118, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "En las familias con hijos que presentan problemas psíquicos graves.", "options": ["Una de las principales ventajas del aprendizaje online:", "Es la de compatibilizarla con el aprendizaje presencial.", "Es la de compatibilizarla con el mundo laboral.", "Es la capacidad de acceder a la educación desde cualquier lugar del mundo", "Es la capacidad muy limitada de acceder a la Educación desde cualquier lugar del mundo."], "answer": 3, "page": "39"}, {"id": 119, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "El subjetivismo axiológico:", "options": ["Sostiene que los valores cobran significado según cómo sean percibidos e interpretados por el sujeto que los reconoce", "Sostiene que los valores cobran significado según como sean malinterpretados por el sujeto que los reconoce.", "Sostiene que los valores cobran significado según como sean percibidos e interpretados por una tercera persona que los reconoce.", "Sostiene que los valores cobran significado según como sean comunicados por el sujeto que los reconoce."], "answer": 0, "page": "40"}, {"id": 120, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "El objetivismo axiológico:", "options": ["Reconoce en los valores un “ser-en-si”, desligado de la experiencia individual subjetiva", "Reconoce en los valores un “ser-natural”, desligado de la experiencia cultural.", "Reconoce los calores un “ser-en-si”, desligado de la experiencia individual objetiva."], "answer": 0, "page": "35"}, {"id": 121, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "Reconoce los valores en un “ser-conmigo”, ligado a la experiencia individual subjetiva. ¿Qué es la mutualidad moral?", "options": ["Es el ámbito de intervención tanto de padres y profesores para compatibilizar escuela y familia.", "Es el concepto según el cual familia y escuela deben competir para que sus actuaciones en todas las funciones que tienen encomendadas sean mejores unas de las otras.", "Es el concepto según el cual familia y escuela deben colaborar para que sus actuaciones en todas las funciones que tienen encomendadas sean complementarias", "Es la mutua que acoge a padres y profesores para su salud psíquica."], "answer": 2, "page": "37"}, {"id": 122, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "La colaboración familia-escuela requiere:", "options": ["Que el profesorado acepte que sus conocimientos en Educación son superiores al saber que pueden aportar las familias.", "Que el profesorado acepte que sus conocimientos en educación no son superiores al saber que pueden aportar las familias", "Que el profesorado acepte  aspecto social de los valores individuales.", "dejar de utilizar la semántica para estudiar los valores.", "Ayudó en gran medida a tener en cuenta el aspecto social de los valores individuales"], "answer": 4, "page": "40"}, {"id": 129, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "La primera protagonista en la gestación social del ciudadano es:", "options": ["La escuela.", "El estado.", "La familia", "La sociedad civil."], "answer": 2, "page": "39"}, {"id": 130, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "La implicación de las familias será posible en medida en que se pongan en marcha y sean efectivos los canales de comunicación, y se las invita a participar de algún modo concreto.", "options": ["En que se pongan en marcha y sean efectivos los canales de comunicación, y no se las invita a participar de algún modo concreto.", "En que se pongan en marcha y sean efectivos los canales de comunicación, aunque no se conozca su efectividad, y se las invita a participar de algún modo general.", "En que se pongan en marcha y sean efectivos los canales de comunicación, y NO se las invita a participar de algún modo general.", "En que se pongan en marcha y sean efectivos los canales de comunicación, y se las invita a participar de algún modo general."], "answer": 3, "page": ""}, {"id": 131, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "En 1948 se publicó la Declaración Universal de los Derechos Humanos, esta postulaba que:", "options": ["Toda persona tiene derecho a la educación y ésta debe ser gratuita", "Los padres no tienen derecho a escoger el tipo de educación que habrá́ de darse a sus hijos/as.", "Todas las demás respuestas son correctas."], "answer": 0, "page": "34"}, {"id": 132, "tema": "La inclusividad y diversidad en el ámbito educativo", "question": "La instrucción elemental no es obligatoria.", "options": ["Cuando hablamos de 'mutualidad moral', nos referimos a:", "la colabo ", "options": ["Los padres y madres participan en las acciones formativas.", "La colaboración entre familia y escuela tiene efectos particularmente positivos:", "En las familias con hijos que presentan problemas en la fiscalía de menores.", "En las familias con hijos que presentan cuadros de despersonalización.", "En las familias con hijos que presentan problemas escolares."], "answer": 4, "page": ""}];let pool=[],index=0,correct=0,wrong=0,answered=new Map(),failedIds=new Set();const $=id=>document.getElementById(id);function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function initThemes(){[...new Set(QUESTIONS.map(q=>q.tema))].filter(Boolean).sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;$('themeFilter').appendChild(o)})}function buildPool(){const theme=$('themeFilter').value,mode=$('mode').value;let p=QUESTIONS.filter(q=>theme==='all'||q.tema===theme);if(mode==='failed')p=p.filter(q=>failedIds.has(q.id));if(mode==='random')p=shuffle([...p]);pool=p;index=0;correct=0;wrong=0;answered=new Map();$('resultPanel').classList.add('hidden');render()}function updateStats(){$('totalStat').textContent=pool.length;$('currentStat').textContent=pool.length?index+1:0;$('okStat').textContent=correct;$('badStat').textContent=wrong}function render(){updateStats();const q=pool[index];$('options').innerHTML='';$('feedback').className='feedback';$('feedback').textContent='';if(!q){$('meta').textContent='No hay preguntas para este filtro.';$('question').textContent='';return}$('meta').textContent=`Pregunta ${index+1}/${pool.length} · ${q.tema}${q.page?' · pág. '+q.page:''}`;$('question').textContent=q.question;q.options.forEach((op,i)=>{const b=document.createElement('button');b.className='option';b.innerHTML=`<strong>${String.fromCharCode(65+i)})</strong> ${op}`;b.onclick=()=>answer(i);$('options').appendChild(b)});$('prevBtn').disabled=index===0;if(answered.has(q.id))showAnswered(answered.get(q.id))}function answer(choice){const q=pool[index];if(answered.has(q.id))return;answered.set(q.id,choice);if(choice===q.answer)correct++;else{wrong++;failedIds.add(q.id)}showAnswered(choice);updateStats()}function showAnswered(choice){const q=pool[index];[...document.querySelectorAll('.option')].forEach((b,i)=>{b.disabled=true;if(i===q.answer)b.classList.add('correct');if(i===choice&&i!==q.answer)b.classList.add('wrong')});const fb=$('feedback');if(choice===q.answer){fb.className='feedback ok';fb.textContent='Correcto.'}else{fb.className='feedback bad';fb.textContent=`Incorrecto. Correcta: ${String.fromCharCode(65+q.answer)}) ${q.options[q.answer]}`}}function finish(){const pct=pool.length?Math.round(correct/pool.length*100):0;$('resultPanel').classList.remove('hidden');$('resultText').textContent=`Has terminado: ${correct} aciertos, ${wrong} fallos, ${pct}%.`}$('startBtn').onclick=buildPool;$('reviewBtn').onclick=()=>{$('mode').value='failed';buildPool()};$('prevBtn').onclick=()=>{if(index>0){index--;render()}};$('nextBtn').onclick=()=>{if(index<pool.length-1){index++;render()}else finish()};initThemes();buildPool();</script></body></html>
